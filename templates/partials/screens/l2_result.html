<div id="screen-l2result" class="screen">
  <header class="sys-header">
    <div class="sys-logo mono">DAS <span>// v0.1.0</span></div>
    <div class="sys-status"><div class="pulse-dot"></div><span>L2 COMPLETE</span></div>
  </header>
  <div class="progress-bar-wrap">
    <div class="progress-steps">
      <div class="p-step done"><div class="p-step-num">✓</div><span>ENTRY</span></div>
      <div class="p-line done"></div>
      <div class="p-step done"><div class="p-step-num">✓</div><span>PATH</span></div>
      <div class="p-line done"></div>
      <div class="p-step done"><div class="p-step-num">✓</div><span>L1 MODEL</span></div>
      <div class="p-line done"></div>
      <div class="p-step done"><div class="p-step-num">✓</div><span>L2 MODEL</span></div>
      <div class="p-line"></div>
      <div class="p-step active"><div class="p-step-num">5</div><span>ROUTING</span></div>
    </div>
  </div>
  <div class="main-content" style="align-items:center;text-align:center">
    <div class="page-tag">LAYER 2 · RISK STRATIFICATION RESULT</div>
    <h2 class="page-title" style="font-size:28px;margin-bottom:4px">Risk Level</h2>
    <p class="page-sub">// disease-specific risk score</p>
    <div class="risk-display">
      <div class="risk-gauge" id="risk-gauge">
        <div class="risk-score-num" id="risk-score-num">--</div>
        <div class="risk-label-text">RISK SCORE</div>
      </div>
      <div class="risk-level-badge" id="risk-level-badge">---</div>
      <div class="risk-info-row" id="risk-info-row"></div>
    </div>
    <div style="display:flex;gap:12px;margin-top:18px;justify-content:center;">
      <button class="btn btn-ghost" onclick="goBackOneStep()">← Back</button>
      <button class="btn btn-primary" onclick="routeToHospital()">Route to Hospital →</button>
    </div>
  </div>
</div>
