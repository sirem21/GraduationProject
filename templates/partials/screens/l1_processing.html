<div id="screen-l1proc" class="screen">
  <header class="sys-header">
    <div class="sys-logo mono">DAS <span>// v0.1.0</span></div>
    <div class="sys-status"><div class="pulse-dot"></div><span>PROCESSING</span></div>
  </header>
  <div class="main-content" style="align-items:center;text-align:center">
    <div class="page-tag">LAYER 1 · INFERENCE ENGINE</div>
    <h2 class="page-title" style="font-size:28px;margin-bottom:32px">Running L1 Model</h2>
    <div class="processing-box">
      <div class="proc-ring"><div class="proc-inner">🧠</div></div>
      <div class="proc-log" id="l1-log"></div>
    </div>
    <button class="btn btn-ghost" onclick="state.path === 'sample' ? showScreen('screen-sample') : showScreen('screen-l1form')" style="margin-top:24px">← Back</button>
  </div>
</div>
