<div id="screen-l1result" class="screen">
  <header class="sys-header">
    <div class="sys-logo mono">DAS <span>// v0.1.0</span></div>
    <div class="sys-status"><div class="pulse-dot"></div><span>L1 COMPLETE</span></div>
  </header>
  <div class="progress-bar-wrap">
    <div class="progress-steps">
      <div class="p-step done"><div class="p-step-num">✓</div><span>ENTRY</span></div>
      <div class="p-line done"></div>
      <div class="p-step done"><div class="p-step-num">✓</div><span>PATH</span></div>
      <div class="p-line done"></div>
      <div class="p-step done"><div class="p-step-num">✓</div><span>L1 MODEL</span></div>
      <div class="p-line"></div>
      <div class="p-step active"><div class="p-step-num">4</div><span>L2 MODEL</span></div>
      <div class="p-line"></div>
      <div class="p-step"><div class="p-step-num">5</div><span>ROUTING</span></div>
    </div>
  </div>
  <div class="main-content" style="align-items:center;text-align:center">
    <div class="page-tag">LAYER 1 · DISEASE ASSESSMENT RESULT</div>
    <h2 class="page-title" style="font-size:28px;margin-bottom:4px">Disease Inference</h2>
    <p class="page-sub">// model output · disease inference summary</p>
    <div class="disease-cards" id="disease-cards"></div>
    <div id="l1-predicted-info" style="margin-bottom:24px"></div>
    <div style="display:flex;gap:12px;margin-top:24px">
      <button class="btn btn-ghost" onclick="state.path === 'sample' ? showScreen('screen-sample') : showScreen('screen-path')">← Back</button>
      <button id="btn-proceed-l2" class="btn btn-primary" onclick="proceedToL2()">Proceed to Layer 2 →</button>
    </div>
  </div>
</div>
