<style>
:root {
  --bg: #f4efe6;
  --bg-soft: #fbf7f0;
  --surface: #fffdf8;
  --surface-2: #f8f3ea;
  --text: #1f2a37;
  --text-soft: #45556b;
  --border: #dfd5c7;
  --border-strong: #cbbba7;

  --primary: #0d9488;
  --primary-soft: #e1f5f2;
  --accent: #d97706;
  --accent-soft: #fff1de;
  --ok: #15803d;
  --warn: #b45309;
  --danger: #b91c1c;

  --stroke-c: #ea580c;
  --diabetes-c: #0f766e;
  --hypertension-c: #be185d;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

html, body {
  min-height: 100%;
  background:
    radial-gradient(circle at 5% 10%, #fff8eb 0, transparent 36%),
    radial-gradient(circle at 95% 0%, #ecfeff 0, transparent 34%),
    linear-gradient(145deg, var(--bg) 0%, #f2ece1 45%, #efe7db 100%);
  color: var(--text);
  font-family: 'Manrope', sans-serif;
  overflow-x: hidden;
}

body::before {
  content: '';
  position: fixed;
  inset: 0;
  pointer-events: none;
  background-image:
    linear-gradient(rgba(31, 42, 55, 0.03) 1px, transparent 1px),
    linear-gradient(90deg, rgba(31, 42, 55, 0.03) 1px, transparent 1px);
  background-size: 42px 42px;
  z-index: 0;
}

.mono { font-family: 'JetBrains Mono', monospace; }

.screen {
  display: none;
  min-height: 100vh;
  position: relative;
  z-index: 1;
  animation: riseIn 0.35s ease;
}

.screen.active { display: flex; flex-direction: column; }

@keyframes riseIn {
  from { opacity: 0; transform: translateY(10px); }
  to { opacity: 1; transform: translateY(0); }
}

.sys-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 16px 28px;
  border-bottom: 1px solid var(--border);
  background: rgba(255, 253, 248, 0.84);
  backdrop-filter: blur(10px);
  position: sticky;
  top: 0;
  z-index: 50;
}

.sys-logo {
  font-family: 'JetBrains Mono', monospace;
  font-size: 12px;
  color: var(--primary);
  letter-spacing: 2px;
  text-transform: uppercase;
}

.sys-logo span { color: #8a7e70; }

.sys-status {
  display: flex;
  align-items: center;
  gap: 8px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  color: var(--text-soft);
}

.pulse-dot {
  width: 9px;
  height: 9px;
  border-radius: 50%;
  background: var(--ok);
  box-shadow: 0 0 0 0 rgba(21, 128, 61, 0.28);
  animation: pulse 1.8s infinite;
}

@keyframes pulse {
  0%, 100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(21, 128, 61, 0.28); }
  50% { transform: scale(1.07); box-shadow: 0 0 0 7px rgba(21, 128, 61, 0); }
}

.progress-bar-wrap {
  padding: 12px 20px;
  border-bottom: 1px solid var(--border);
  background: rgba(255, 251, 245, 0.85);
}

.progress-steps {
  display: flex;
  align-items: center;
  max-width: 920px;
  margin: 0 auto;
}

.p-step {
  display: flex;
  align-items: center;
  gap: 9px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  color: #8d7f70;
  letter-spacing: 0.6px;
  flex: 1;
}

.p-step-num {
  width: 24px;
  height: 24px;
  border-radius: 50%;
  border: 1px solid var(--border-strong);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 11px;
  flex-shrink: 0;
  transition: all 0.2s ease;
}

.p-step.done .p-step-num {
  background: var(--primary);
  border-color: var(--primary);
  color: #fff;
}

.p-step.active .p-step-num {
  border-color: var(--accent);
  color: var(--accent);
  background: var(--accent-soft);
}

.p-step.active { color: var(--accent); }

.p-line {
  flex: 1;
  height: 2px;
  background: #e6dac9;
  margin: 0 8px;
  border-radius: 999px;
}

.p-line.done { background: var(--primary); }

.main-content {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 44px 20px 56px;
  max-width: 980px;
  width: 100%;
  margin: 0 auto;
}

.form-page {
  align-items: center;
  max-width: 860px;
}

.page-tag {
  font-family: 'JetBrains Mono', monospace;
  font-size: 12px;
  letter-spacing: 2px;
  color: var(--primary);
  text-transform: uppercase;
  margin-bottom: 12px;
  text-align: center;
}

.page-title {
  font-family: 'Sora', sans-serif;
  font-size: clamp(32px, 5vw, 56px);
  font-weight: 700;
  line-height: 1.08;
  text-align: center;
  margin-bottom: 12px;
}

.page-sub {
  font-family: 'JetBrains Mono', monospace;
  font-size: 13px;
  color: var(--text-soft);
  text-align: center;
  margin-bottom: 34px;
}

.btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
  padding: 13px 24px;
  border-radius: 12px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 12px;
  letter-spacing: 0.9px;
  text-transform: uppercase;
  cursor: pointer;
  border: 1px solid transparent;
  transition: all 0.2s ease;
  font-weight: 600;
}

.btn-primary {
  background: var(--primary);
  border-color: var(--primary);
  color: #fff;
  box-shadow: 0 8px 20px rgba(13, 148, 136, 0.16);
}

.btn-primary:hover {
  transform: translateY(-1px);
  background: #0f766e;
  border-color: #0f766e;
}

.btn-ghost {
  background: #fff;
  color: var(--text);
  border-color: var(--border-strong);
}

.btn-ghost:hover {
  border-color: var(--primary);
  color: var(--primary);
}

.label-tag {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  letter-spacing: 1px;
  text-transform: uppercase;
  padding: 4px 10px;
  border-radius: 999px;
  display: inline-block;
  border: 1px solid transparent;
}

.tag-stroke { background: #ffedd5; color: #c2410c; border-color: #fdba74; }
.tag-diabetes { background: #ccfbf1; color: #0f766e; border-color: #5eead4; }
.tag-hypertension { background: #fce7f3; color: #be185d; border-color: #f9a8d4; }
.tag-low { background: #dcfce7; color: #166534; border-color: #86efac; }
.tag-medium { background: #fef3c7; color: #a16207; border-color: #fcd34d; }
.tag-high { background: #fee2e2; color: #b91c1c; border-color: #fca5a5; }

.landing-logo {
  font-family: 'JetBrains Mono', monospace;
  font-size: 12px;
  letter-spacing: 2.2px;
  color: var(--primary);
  margin-bottom: 24px;
  text-align: center;
}

.landing-title .accent { color: var(--accent); }

.landing-sub {
  font-family: 'JetBrains Mono', monospace;
  font-size: 13px;
  color: var(--text-soft);
  text-align: center;
  margin-bottom: 44px;
}

.disclaimer-box {
  background: #fffdf7;
  border: 1px solid #f2d39f;
  border-left: 5px solid var(--accent);
  border-radius: 14px;
  padding: 18px 20px;
  margin-bottom: 30px;
  max-width: 620px;
}

.disclaimer-box p {
  font-size: 13px;
  color: #5f4b34;
  line-height: 1.7;
}

.disclaimer-box p strong { color: #92400e; }

.path-grid,
.samples-grid,
.disease-cards,
.summary-grid {
  width: 100%;
  max-width: 860px;
  display: grid;
  gap: 18px;
}

.path-grid,
.samples-grid,
.summary-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }

.path-card,
.sample-card,
.disease-card,
.summary-card,
.selected-hosp-card,
.risk-info-pill,
.hosp-card,
.proc-log,
.form-section {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 16px;
  box-shadow: 0 12px 30px rgba(53, 42, 26, 0.06);
}

.path-card,
.sample-card,
.hosp-card,
.disease-card {
  transition: transform 0.2s ease, box-shadow 0.2s ease, border-color 0.2s ease;
}

.path-card:hover,
.sample-card:hover,
.hosp-card:hover,
.disease-card:hover {
  transform: translateY(-2px);
  border-color: #ccb89f;
  box-shadow: 0 16px 30px rgba(53, 42, 26, 0.12);
}

.path-card {
  padding: 26px;
  gap: 14px;
}

.path-card h3 { font-size: 26px; font-family: 'Sora', sans-serif; }
.path-card p { font-size: 13px; color: var(--text-soft); line-height: 1.6; }
.path-icon { font-size: 36px; }

.sample-card { padding: 18px; }
.sample-id { font-size: 11px; color: var(--primary); }
.sample-name { font-size: 20px; font-family: 'Sora', sans-serif; margin-bottom: 8px; }
.sample-profile { font-size: 13px; color: var(--text-soft); }
.sample-card.selected { border-color: var(--primary); box-shadow: 0 0 0 2px rgba(13, 148, 136, 0.18); }

.form-section {
  width: 100%;
  max-width: 820px;
  margin-bottom: 18px;
  padding: 18px;
}

.form-section-title {
  font-family: 'JetBrains Mono', monospace;
  font-size: 12px;
  letter-spacing: 1px;
  color: var(--primary);
  text-transform: uppercase;
  margin-bottom: 14px;
  padding-bottom: 8px;
  border-bottom: 1px dashed #d8cab6;
}

.form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }

.field {
  display: flex;
  flex-direction: column;
  gap: 8px;
  padding: 12px;
  border-radius: 12px;
  background: var(--surface-2);
  border: 1px solid #ecdfcf;
}

.field-label {
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  color: #6f5f4c;
  letter-spacing: 0.5px;
  text-transform: uppercase;
}

.slider-wrap { display: flex; align-items: center; gap: 10px; }

.slider-wrap input[type=range] {
  flex: 1;
  appearance: none;
  height: 6px;
  background: #d9ccbb;
  border-radius: 999px;
}

.slider-wrap input[type=range]::-webkit-slider-thumb {
  appearance: none;
  width: 17px;
  height: 17px;
  border-radius: 50%;
  background: var(--primary);
  border: 2px solid #fff;
  box-shadow: 0 0 0 2px rgba(13, 148, 136, 0.25);
}

.slider-val {
  font-family: 'JetBrains Mono', monospace;
  font-size: 13px;
  color: var(--primary);
  min-width: 56px;
  text-align: right;
  font-weight: 600;
}

.toggle-group { display: flex; gap: 8px; }

.toggle-btn {
  flex: 1;
  padding: 9px;
  border-radius: 10px;
  border: 1px solid #d5c6b4;
  background: #fff;
  color: #726250;
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  cursor: pointer;
  transition: all 0.2s ease;
}

.toggle-btn.yes.active { background: #dcfce7; border-color: #86efac; color: #166534; }
.toggle-btn.no.active { background: #fee2e2; border-color: #fca5a5; color: #991b1b; }

.processing-box { width: 100%; max-width: 520px; gap: 24px; display: flex; flex-direction: column; align-items: center; }

.proc-ring {
  width: 110px;
  height: 110px;
  border-radius: 50%;
  border: 3px solid #d7c8b4;
  border-top-color: var(--primary);
  animation: spin 1.1s linear infinite;
  display: flex;
  align-items: center;
  justify-content: center;
  background: #fff;
}

.proc-inner { font-size: 28px; }

.proc-log {
  padding: 16px;
  width: 100%;
  min-height: 132px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 12px;
  line-height: 1.7;
  color: #5f4f3d;
}

.proc-log .ok { color: var(--ok); }
.proc-log .info { color: var(--primary); }

.disease-cards {
  display: flex;
  justify-content: center;
  align-items: stretch;
  gap: 20px;
  width: 100%;
  max-width: 860px;
  margin-bottom: 18px;
}

.disease-card {
  width: 100%;
  max-width: 560px;
  padding: 24px;
  gap: 14px;
  border-radius: 22px;
  background:
    linear-gradient(180deg, rgba(255,255,255,0.98), rgba(250,247,242,0.98));
  position: relative;
  overflow: hidden;
}

.disease-card::before {
  content: '';
  position: absolute;
  inset: 0;
  background: radial-gradient(circle at top right, rgba(13,148,136,0.08), transparent 42%);
  pointer-events: none;
}

.disease-card.predicted { border-width: 2px; }
.disease-card.stroke.predicted { border-color: #fdba74; box-shadow: 0 16px 34px rgba(234,88,12,0.10); }
.disease-card.diabetes.predicted { border-color: #5eead4; box-shadow: 0 16px 34px rgba(15,118,110,0.10); }
.disease-card.hypertension.predicted { border-color: #f9a8d4; box-shadow: 0 16px 34px rgba(190,24,93,0.10); }
.dc-name { font-size: 16px; font-weight: 700; }
.dc-score { font-family: 'Sora', sans-serif; font-size: 42px; font-weight: 700; }
.dc-score.stroke { color: var(--stroke-c); }
.dc-score.diabetes { color: var(--diabetes-c); }
.dc-score.hypertension { color: var(--hypertension-c); }

.l1-summary-hero {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 16px;
  width: 100%;
}

.l1-summary-topline {
  display: inline-flex;
  align-items: center;
  gap: 10px;
  flex-wrap: wrap;
  justify-content: center;
}

.l1-score-stack {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 4px;
}

.l1-score-label {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  letter-spacing: 1.2px;
  color: #7a6d5f;
  text-transform: uppercase;
}

.l1-score-value {
  font-family: 'Sora', sans-serif;
  font-size: clamp(44px, 8vw, 64px);
  line-height: 1;
  font-weight: 700;
}

.l1-score-value.stroke { color: var(--stroke-c); }
.l1-score-value.diabetes { color: var(--diabetes-c); }
.l1-score-value.hypertension { color: var(--hypertension-c); }

.l1-note-box {
  width: 100%;
  max-width: 560px;
  padding: 16px 18px;
  border: 1px solid #e6d8c7;
  border-radius: 16px;
  background: rgba(255,255,255,0.78);
  box-shadow: 0 10px 24px rgba(53,42,26,0.05);
}

.l1-note-title {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  letter-spacing: 1.4px;
  text-transform: uppercase;
  color: var(--accent);
  margin-bottom: 8px;
}

.l1-note-text {
  font-size: 14px;
  line-height: 1.7;
  color: var(--text);
  text-align: center;
}

.l1-secondary-list {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  margin-top: 12px;
  justify-content: center;
}

.l1-secondary-chip {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  padding: 6px 10px;
  border-radius: 999px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  letter-spacing: 0.8px;
  text-transform: uppercase;
  border: 1px solid transparent;
}

.l1-secondary-chip.stroke { background: #ffedd5; color: #c2410c; border-color: #fdba74; }
.l1-secondary-chip.diabetes { background: #ccfbf1; color: #0f766e; border-color: #5eead4; }
.l1-secondary-chip.hypertension { background: #fce7f3; color: #be185d; border-color: #f9a8d4; }

.l1-no-disease-box {
  width: 100%;
  max-width: 560px;
  padding: 18px 20px;
  border-radius: 16px;
  border: 1px solid #f1c7c7;
  background: linear-gradient(180deg, rgba(255,245,245,0.96), rgba(255,255,255,0.94));
  box-shadow: 0 10px 24px rgba(153,27,27,0.06);
}

.l1-no-disease-box .headline {
  font-family: 'Sora', sans-serif;
  font-size: 20px;
  color: var(--danger);
  margin-bottom: 6px;
}

.l1-no-disease-box .copy {
  font-size: 14px;
  line-height: 1.7;
  color: var(--text);
}

.l1-no-disease-box .copy span {
  display: block;
  margin-top: 10px;
  color: var(--text-soft);
  font-family: 'JetBrains Mono', monospace;
  font-size: 12px;
}

.score-bar { height: 8px; background: #ece3d6; border-radius: 999px; overflow: hidden; }
.score-fill { height: 100%; border-radius: 999px; transition: width 0.8s ease; }

.score-fill.stroke { background: linear-gradient(90deg, #fdba74, #ea580c); }
.score-fill.diabetes { background: linear-gradient(90deg, #5eead4, #0f766e); }
.score-fill.hypertension { background: linear-gradient(90deg, #f9a8d4, #be185d); }

.risk-display { max-width: 620px; margin-bottom: 26px; display: flex; flex-direction: column; align-items: center; }

.risk-gauge {
  width: 230px;
  height: 230px;
  border-radius: 50%;
  border: 5px solid #dacbb9;
  background: #fff;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
}

.risk-gauge.low { border-color: #86efac; }
.risk-gauge.medium { border-color: #fcd34d; }
.risk-gauge.high { border-color: #fca5a5; }

.risk-score-num { font-family: 'Sora', sans-serif; font-size: 58px; font-weight: 700; }
.risk-score-num.low { color: #166534; }
.risk-score-num.medium { color: #a16207; }
.risk-score-num.high { color: #991b1b; }

.risk-level-badge { font-family: 'Sora', sans-serif; font-size: 28px; letter-spacing: 2px; }
.risk-level-badge.low { color: #166534; }
.risk-level-badge.medium { color: #a16207; }
.risk-level-badge.high { color: #991b1b; }

.risk-info-row { display: flex; gap: 12px; flex-wrap: wrap; justify-content: center; }
.risk-info-pill { padding: 12px 16px; min-width: 140px; }
.risk-info-pill span:first-child { font-size: 10px; color: #6d5e4d; }
.risk-info-pill span:last-child { font-size: 14px; color: var(--text); }

.hospital-list { width: 100%; max-width: 860px; gap: 14px; margin-bottom: 24px; }

.hosp-card {
  padding: 16px 18px;
  grid-template-columns: 48px 1fr auto;
  gap: 12px;
  align-items: center;
}

.hosp-rank { font-family: 'Sora', sans-serif; font-size: 20px; color: #8d7f70; }
.hosp-rank.first { color: var(--primary); }
.hosp-name { font-size: 20px; font-family: 'Sora', sans-serif; }
.hosp-meta-item { font-family: 'JetBrains Mono', monospace; font-size: 11px; color: #675846; }
.hosp-score-val { font-family: 'Sora', sans-serif; font-size: 24px; color: var(--primary); }
.hosp-score-bar { width: 92px; height: 8px; background: #e8dccb; border-radius: 999px; overflow: hidden; }
.hosp-score-fill { height: 100%; background: linear-gradient(90deg, #14b8a6, #0f766e); border-radius: 999px; }

.specialist-badge,
.no-spec-badge {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  padding: 4px 8px;
  border-radius: 999px;
}

.specialist-badge { background: #ccfbf1; color: #0f766e; border: 1px solid #5eead4; }
.no-spec-badge { background: #f5efe6; color: #7a6d5f; border: 1px solid #d6c6b1; }

.summary-grid { grid-template-columns: repeat(3, minmax(0, 1fr)); margin-bottom: 22px; }

.summary-card { padding: 18px; }
.summary-card .s-label { font-size: 10px; color: #7a6c5c; }
.summary-card .s-val { font-size: 20px; font-family: 'Sora', sans-serif; }

.selected-hosp-card {
  width: 100%;
  max-width: 640px;
  padding: 20px;
  border: 2px solid var(--primary);
}

.selected-hosp-card .sh-label { font-size: 10px; color: var(--primary); }
.selected-hosp-card .sh-name { font-size: 30px; font-family: 'Sora', sans-serif; }
.selected-hosp-card .sh-meta { font-size: 12px; color: #6c5d4a; }

.sim-complete {
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  color: var(--ok);
  margin-bottom: 22px;
}

.step-back-btn {
  position: fixed;
  right: 20px;
  bottom: 20px;
  z-index: 90;
  border: 1px solid var(--border-strong);
  background: #fff;
  color: var(--text);
  border-radius: 999px;
  padding: 10px 16px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 12px;
  cursor: pointer;
  box-shadow: 0 8px 20px rgba(60, 45, 24, 0.15);
}

.step-back-btn:hover { border-color: var(--primary); color: var(--primary); }
.step-back-btn.hidden { display: none; }

@media (max-width: 900px) {
  .progress-steps { gap: 2px; }
  .p-step { font-size: 9px; }
  .page-title { font-size: clamp(26px, 7vw, 44px); }
  .disease-cards { max-width: 100%; }
  .summary-grid { grid-template-columns: 1fr; }
  .hosp-card { grid-template-columns: 36px 1fr; }
  .hosp-score-col { display: none; }
}

@media (max-width: 640px) {
  .path-grid,
